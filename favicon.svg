<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경 -->
  <rect width="32" height="32" rx="6" fill="#141720"/>

  <!-- 제체 단면 (좌측 고지반, 우측으로 경사) -->
  <path d="M31 29 L31 21 L19 8 L1 8 L1 29 Z" fill="#253050"/>
  <!-- 표면 경계선 -->
  <polyline points="31,21 19,8 1,8" fill="none" stroke="#3a5280" stroke-width="1"/>

  <!-- 파괴원호: 좌측 고지반 끝(1,8) → 제체 내부 관통 → 경사 하단(31,21) -->
  <path d="M1 8 A20 20 0 0 0 31 21"
        stroke="#4a8ef0" stroke-width="2.5" fill="none"
        stroke-linecap="round"/>

  <!-- 진입/진출점 -->
  <circle cx="1"  cy="8"  r="1.8" fill="#6ea8ff"/>
  <circle cx="31" cy="21" r="1.8" fill="#6ea8ff"/>
</svg>
